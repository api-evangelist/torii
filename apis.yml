description: >-
  Torii is the market leading SaaS Management Platform built to bring all your
  software into one place. Discover shadow IT, enforce governance, cut costs, and
  operationalize every app. Torii integrates with 180+ SaaS applications to provide
  license and usage data, automate user onboarding and offboarding workflows, manage
  SaaS contracts and renewals, and maintain compliance audit trails.
