      - url: json-schema/contract.json
        type: JSONSchema
      - url: json-schema/audit-log-entry.json
        type: JSONSchema
      - url: json-schema/field-metadata.json
        type: JSONSchema
      - url: json-schema/parsing-request.json
        type: JSONSchema
      - url: json-schema/scim-user.json
        type: JSONSchema
      - url: json-ld/torii-context.jsonld
        type: JSONLD
    description: >-
      The Torii API provides programmatic access to the Torii SaaS Management
      Platform. It allows IT, Finance, and Security teams to manage apps, users,
      contracts, licenses, audit logs, and file uploads. Supports custom
      integration data sync, workflow execution monitoring, and SCIM 2.0 user
      provisioning. The API closely follows REST semantics, uses JSON to encode
      objects, cursor-based pagination, and relies on standard HTTP codes to
      signal operation outcomes. Authentication uses Bearer API keys generated
      in Torii Settings.
