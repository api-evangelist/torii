naftiko: 1.0.0-alpha2
info:
  label: Torii API
  description: 'Torii API. 2 operations. Lead operation: Torii Sync custom integration. Self-contained Naftiko capability
    covering one Torii business surface.'
  tags:
  - Torii
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORII_API_KEY: TORII_API_KEY
capability:
  consumes:
  - type: http
    namespace: torii-general
    baseUri: https://api.toriihq.com/v1.0
    description: Torii API business capability. Self-contained, no shared references.
    resources:
    - name: services-sync-custom
      path: /services/sync/custom
      operations:
      - name: synccustomintegration
        method: POST
        description: Torii Sync custom integration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: workflows-actionExecutions
      path: /workflows/actionExecutions
      operations:
      - name: getworkflowactionexecutions
        method: GET
        description: Torii List workflow action executions
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: sort
          in: query
          type: string
          description: Field to sort results by.
        - name: size
          in: query
          type: integer
          description: Number of results per page.
        - name: cursor
          in: query
          type: string
          description: Cursor for pagination.
    authentication:
      type: bearer
      token: '{{env.TORII_API_KEY}}'
  exposes:
  - type: rest
    namespace: torii-general-rest
    port: 8080
    description: REST adapter for Torii API. One Spectral-compliant resource per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/services/sync/custom
      name: services-sync-custom
      description: REST surface for services-sync-custom.
      operations:
      - method: POST
        name: synccustomintegration
        description: Torii Sync custom integration
        call: torii-general.synccustomintegration
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/workflows/actionexecutions
      name: workflows-actionexecutions
      description: REST surface for workflows-actionExecutions.
      operations:
      - method: GET
        name: getworkflowactionexecutions
        description: Torii List workflow action executions
        call: torii-general.getworkflowactionexecutions
        with:
          sort: rest.sort
          size: rest.size
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: torii-general-mcp
    port: 9090
    transport: http
    description: MCP adapter for Torii API. One tool per consumed operation, routed inline through this capability's consumes
      block.
    tools:
    - name: torii-sync-custom-integration
      description: Torii Sync custom integration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: torii-general.synccustomintegration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: torii-list-workflow-action-executions
      description: Torii List workflow action executions
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: torii-general.getworkflowactionexecutions
      with:
        sort: tools.sort
        size: tools.size
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
