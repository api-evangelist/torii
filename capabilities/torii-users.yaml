naftiko: 1.0.0-alpha2
info:
  label: Torii API — Users
  description: 'Torii API — Users. 1 operations. Lead operation: Torii List users. Self-contained Naftiko capability covering
    one Torii business surface.'
  tags:
  - Torii
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORII_API_KEY: TORII_API_KEY
capability:
  consumes:
  - type: http
    namespace: torii-users
    baseUri: https://api.toriihq.com/v1.0
    description: Torii API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: getusers
        method: GET
        description: Torii List users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
          description: Comma-separated list of fields to include in the response.
        - name: sort
          in: query
          type: string
          description: Field to sort results by.
        - name: size
          in: query
          type: integer
          description: Number of results per page.
        - name: cursor
          in: query
          type: string
          description: Cursor for pagination to retrieve the next page of results.
    authentication:
      type: bearer
      token: '{{env.TORII_API_KEY}}'
  exposes:
  - type: rest
    namespace: torii-users-rest
    port: 8080
    description: REST adapter for Torii API — Users. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: getusers
        description: Torii List users
        call: torii-users.getusers
        with:
          fields: rest.fields
          sort: rest.sort
          size: rest.size
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: torii-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Torii API — Users. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: torii-list-users
      description: Torii List users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: torii-users.getusers
      with:
        fields: tools.fields
        sort: tools.sort
        size: tools.size
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
