naftiko: 1.0.0-alpha2
info:
  label: Torii API — Parsings
  description: 'Torii API — Parsings. 2 operations. Lead operation: Torii Map CSV columns. Self-contained Naftiko capability
    covering one Torii business surface.'
  tags:
  - Torii
  - Parsings
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    TORII_API_KEY: TORII_API_KEY
capability:
  consumes:
  - type: http
    namespace: torii-parsings
    baseUri: https://api.toriihq.com/v1.0
    description: Torii API — Parsings business capability. Self-contained, no shared references.
    resources:
    - name: parsings-manual
      path: /parsings/manual
      operations:
      - name: updateparsingmanual
        method: PUT
        description: Torii Map CSV columns
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: parsings-id
      path: /parsings/{id}
      operations:
      - name: getparsingrequest
        method: GET
        description: Torii Get parse request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: The unique identifier of the parsing request.
          required: true
    authentication:
      type: bearer
      token: '{{env.TORII_API_KEY}}'
  exposes:
  - type: rest
    namespace: torii-parsings-rest
    port: 8080
    description: REST adapter for Torii API — Parsings. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/parsings/manual
      name: parsings-manual
      description: REST surface for parsings-manual.
      operations:
      - method: PUT
        name: updateparsingmanual
        description: Torii Map CSV columns
        call: torii-parsings.updateparsingmanual
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/parsings/{id}
      name: parsings-id
      description: REST surface for parsings-id.
      operations:
      - method: GET
        name: getparsingrequest
        description: Torii Get parse request
        call: torii-parsings.getparsingrequest
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: torii-parsings-mcp
    port: 9090
    transport: http
    description: MCP adapter for Torii API — Parsings. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: torii-map-csv-columns
      description: Torii Map CSV columns
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: torii-parsings.updateparsingmanual
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: torii-get-parse-request
      description: Torii Get parse request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: torii-parsings.getparsingrequest
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
